name: Lint and Build with Bun

on:
  # Runs on pushes to the default branch
  push:
    branches: ["master"]

  # Allows you to trigger this workflow manually
  workflow_dispatch:

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      # Étape 1 : Checkout du dépôt
      - name: Checkout repository
        uses: actions/checkout@v4

      # Étape 2 : Installer Bun
      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 'latest'

      # Étape 3 : Cache Bun et node_modules
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun
            .bun
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      # Étape 4 : Installer les dépendances avec Bun
      - name: Install dependencies
        run: bun install

      # Étape 5 : Lint avec Biome
      - name: Lint code with Biome
        run: bun run lint

      # Étape 6 : Build Next.js
      - name: Build Next.js site
        run: bun run build
